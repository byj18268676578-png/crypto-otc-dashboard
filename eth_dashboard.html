<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETH OTC Index Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #fff; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 200px; background: #1a1a2e; padding: 20px; overflow-y: auto; }
        .sidebar h2 { font-size: 18px; margin-bottom: 20px; color: #4fc3f7; }
        .asset-btn { 
            display: block; width: 100%; padding: 10px; margin: 5px 0; 
            background: #252542; border: none; color: #fff; cursor: pointer; 
            border-radius: 5px; text-align: left; transition: all 0.3s;
        }
        .asset-btn:hover, .asset-btn.active { background: #4fc3f7; color: #000; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .chart-container { background: #1a1a2e; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #1a1a2e; padding: 15px; border-radius: 8px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #4fc3f7; }
        .stat-label { font-size: 12px; color: #888; margin-top: 5px; }
        .legend { display: flex; gap: 20px; margin: 15px 0; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; }
        .entry-badge { background: #4caf50; }
        .exit-badge { background: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>Assets</h2>
            <button class="asset-btn active" onclick="loadAsset('ETH')">ETH</button>
            <button class="asset-btn" onclick="loadAsset('BTC')">BTC</button>
            <button class="asset-btn" onclick="loadAsset('BNB')">BNB</button>
            <button class="asset-btn" onclick="loadAsset('SOL')">SOL</button>
        </div>
        <div class="main">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="otc-value">--</div>
                    <div class="stat-label">OTC Index</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="explosion-value">--</div>
                    <div class="stat-label">Explosion Index</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="period-value">--</div>
                    <div class="stat-label">Period Status</div>
                </div>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-color entry-badge"></div>Entry Period</div>
                <div class="legend-item"><div class="legend-color exit-badge"></div>Exit Period</div>
            </div>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // ETH Sample Data (April 14-21, 2026)
        const ethData = {
            dates: ['4/14', '4/15', '4/16', '4/17', '4/18', '4/19', '4/20', '4/21'],
            otcIndex: [1156, 1189, 1223, 1245, 1267, 1234, 1198, 1176],
            explosionIndex: [145, 167, 189, 201, 178, 156, 134, 112],
            periodStatus: ['entry-3', 'entry-2', 'entry-1', 'entry', 'exit-1', 'exit-2', 'exit-3', 'exit-4']
        };

        let chart;

        function loadAsset(asset) {
            // Update active button
            document.querySelectorAll('.asset-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update stats
            const latestIdx = ethData.otcIndex.length - 1;
            document.getElementById('otc-value').textContent = ethData.otcIndex[latestIdx];
            document.getElementById('explosion-value').textContent = ethData.explosionIndex[latestIdx];
            
            const period = ethData.periodStatus[latestIdx];
            document.getElementById('period-value').textContent = period.includes('entry') ? 'Entry Period' : 'Exit Period';

            renderChart();
        }

        function renderChart() {
            if (chart) chart.destroy();

            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ethData.dates,
                    datasets: [
                        {
                            label: 'OTC Index',
                            data: ethData.otcIndex,
                            borderColor: '#4fc3f7',
                            backgroundColor: 'rgba(79, 195, 247, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: 'Explosion Index',
                            data: ethData.explosionIndex,
                            borderColor: '#ffc107',
                            backgroundColor: 'rgba(255, 193, 7, 0.1)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            callbacks: {
                                label: function(context) {
                                    const idx = context.dataIndex;
                                    const period = ethData.periodStatus[idx];
                                    return [
                                        `${context.dataset.label}: ${context.parsed.y}`,
                                        `Status: ${period}`
                                    ];
                                }
                            }
                        },
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#333' },
                            ticks: { color: '#fff' }
                        },
                        y: {
                            grid: { color: '#333' },
                            ticks: { color: '#fff' }
                        }
                    }
                }
            });
        }

        // Initial load
        renderChart();
    </script>
</body>
</html>
